name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if deployment secrets are configured
      run: |
        if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ]; then
          echo "⚠️  Deployment skipped: Missing DEPLOY_HOST or DEPLOY_USER secrets"
          exit 0
        fi
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    - name: Deploy to production server
      if: secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != ''
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      run: |
        # Create SSH key file
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        
        # Add host to known_hosts
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Deploy using SSH
        ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
          cd /path/to/app
          docker compose pull
          docker compose up -d
          docker compose exec -T server npm run migrate || true
        EOF
