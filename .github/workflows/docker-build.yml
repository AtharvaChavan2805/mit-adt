name: Docker Build & Push

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Check Docker credentials
      id: check-docker-creds
      run: |
        if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
          echo "has_credentials=false" >> $GITHUB_OUTPUT
          echo "⚠️  Docker credentials not configured - will build but not push"
        else
          echo "has_credentials=true" >> $GITHUB_OUTPUT
        fi
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    - name: Log in to Docker Hub
      if: steps.check-docker-creds.outputs.has_credentials == 'true' && github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME || 'dummy' }}
        password: ${{ secrets.DOCKER_PASSWORD || 'dummy' }}
      continue-on-error: true

    - name: Extract metadata (server)
      id: meta-server
      uses: docker/metadata-action@v5
      with:
        images: atharvachavan2805/mit-adt-server
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push server image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: ${{ steps.check-docker-creds.outputs.has_credentials == 'true' && github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-server.outputs.tags }}
        labels: ${{ steps.meta-server.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata (client)
      id: meta-client
      uses: docker/metadata-action@v5
      with:
        images: atharvachavan2805/mit-adt-client
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push client image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: ${{ steps.check-docker-creds.outputs.has_credentials == 'true' && github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-client.outputs.tags }}
        labels: ${{ steps.meta-client.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
